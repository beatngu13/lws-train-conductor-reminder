queue_rules:
  - name: default
    queue_conditions:
      - "check-success=build"
      - "author=renovate[bot]"
    merge_conditions:
      - "check-success=build"
    update_method: rebase
    merge_method: merge

pull_request_rules:
  - name: queue_renovate_pr
    conditions:
      - "author=renovate[bot]"
    actions:
      queue:
